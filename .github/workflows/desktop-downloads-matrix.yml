name: Desktop Downloads Matrix

on:
  workflow_dispatch:
    inputs:
      deploy_portal_downloads:
        description: "Publish desktop-download-bundle into configured portal downloads directory"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - Docker
    paths:
      - '.github/workflows/desktop-downloads-matrix.yml'
      - 'Chummer.Avalonia/**'
      - 'Chummer.Blazor.Desktop/**'
      - 'Chummer.Blazor/**'
      - 'Chummer.Contracts/**'
      - 'Chummer.Portal/**'
      - 'Chummer.Presentation/**'
      - 'global.json'
      - 'scripts/generate-releases-manifest.sh'
      - 'scripts/publish-download-bundle.sh'

permissions:
  contents: read

jobs:
  build-desktop:
    name: Build ${{ matrix.app }} ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: avalonia
            project: Chummer.Avalonia/Chummer.Avalonia.csproj
            os: windows-latest
            rid: win-x64
            archive_ext: zip
          - app: avalonia
            project: Chummer.Avalonia/Chummer.Avalonia.csproj
            os: windows-latest
            rid: win-arm64
            archive_ext: zip
          - app: avalonia
            project: Chummer.Avalonia/Chummer.Avalonia.csproj
            os: ubuntu-latest
            rid: linux-x64
            archive_ext: tar.gz
          - app: avalonia
            project: Chummer.Avalonia/Chummer.Avalonia.csproj
            os: ubuntu-latest
            rid: linux-arm64
            archive_ext: tar.gz
          - app: avalonia
            project: Chummer.Avalonia/Chummer.Avalonia.csproj
            os: macos-latest
            rid: osx-arm64
            archive_ext: tar.gz
          - app: blazor-desktop
            project: Chummer.Blazor.Desktop/Chummer.Blazor.Desktop.csproj
            os: windows-latest
            rid: win-x64
            archive_ext: zip
          - app: blazor-desktop
            project: Chummer.Blazor.Desktop/Chummer.Blazor.Desktop.csproj
            os: windows-latest
            rid: win-arm64
            archive_ext: zip
          - app: blazor-desktop
            project: Chummer.Blazor.Desktop/Chummer.Blazor.Desktop.csproj
            os: ubuntu-latest
            rid: linux-x64
            archive_ext: tar.gz
          - app: blazor-desktop
            project: Chummer.Blazor.Desktop/Chummer.Blazor.Desktop.csproj
            os: ubuntu-latest
            rid: linux-arm64
            archive_ext: tar.gz
          - app: blazor-desktop
            project: Chummer.Blazor.Desktop/Chummer.Blazor.Desktop.csproj
            os: macos-latest
            rid: osx-arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Publish desktop app
        shell: bash
        run: |
          set -euo pipefail
          out_dir="out/${{ matrix.app }}/${{ matrix.rid }}"
          dotnet publish "${{ matrix.project }}" \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o "$out_dir"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $archive = "dist/chummer-${{ matrix.app }}-${{ matrix.rid }}.zip"
          if (Test-Path $archive) { Remove-Item $archive -Force }
          Compress-Archive -Path "out/${{ matrix.app }}/${{ matrix.rid }}/*" -DestinationPath $archive -Force

      - name: Package archive (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -C "out/${{ matrix.app }}/${{ matrix.rid }}" -czf "dist/chummer-${{ matrix.app }}-${{ matrix.rid }}.tar.gz" .

      - name: Upload RID artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.app }}-${{ matrix.rid }}
          path: dist/chummer-${{ matrix.app }}-${{ matrix.rid }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 14

  generate-manifest:
    name: Generate Downloads Manifest
    needs: build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: dist

      - name: Stage portal downloads directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/files
          shopt -s nullglob
          moved=0
          for artifact in dist/chummer-*.zip dist/chummer-*.tar.gz; do
            [[ -f "$artifact" ]] || continue
            mv "$artifact" dist/files/
            moved=1
          done
          if [[ "$moved" -ne 1 ]]; then
            echo "No desktop artifacts were staged for manifest generation." >&2
            exit 1
          fi

      - name: Generate releases.json
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          dist = Path('dist')
          files_dir = dist / 'files'
          dist.mkdir(parents=True, exist_ok=True)
          files_dir.mkdir(parents=True, exist_ok=True)

          app_labels = {
              'avalonia': 'Avalonia Desktop',
              'blazor-desktop': 'Blazor Desktop',
          }
          platform_names = {
              'win-x64': 'Windows x64',
              'win-arm64': 'Windows ARM64',
              'linux-x64': 'Linux x64',
              'linux-arm64': 'Linux ARM64',
              'osx-arm64': 'macOS ARM64',
          }

          downloads = []
          pattern = re.compile(r'^chummer-(?P<app>avalonia|blazor-desktop)-(?P<rid>[^.]+)\.(?P<ext>zip|tar\.gz)$')
          for artifact in sorted(files_dir.iterdir()):
              if not artifact.is_file():
                  continue
              match = pattern.match(artifact.name)
              if not match:
                  continue

              app = match.group('app')
              rid = match.group('rid')
              sha256 = hashlib.sha256(artifact.read_bytes()).hexdigest()
              downloads.append(
                  {
                      'id': f'{app}-{rid}',
                      'platform': f"{app_labels.get(app, app)} {platform_names.get(rid, rid)}",
                      'url': f'/downloads/files/{artifact.name}',
                      'sha256': sha256,
                  }
              )

          if not downloads:
              raise SystemExit('No desktop artifacts were found for manifest generation')

          manifest = {
              'version': f"run-{os.environ.get('GITHUB_RUN_NUMBER', 'local')}",
              'channel': 'docker',
              'publishedAt': datetime.datetime.now(datetime.timezone.utc).isoformat().replace('+00:00', 'Z'),
              'downloads': downloads,
          }

          manifest_path = dist / 'releases.json'
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          print(f'Wrote {manifest_path}')
          PY

      - name: Upload manifest bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-download-bundle
          path: dist
          if-no-files-found: error
          retention-days: 14

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## Desktop Download Bundle"
            echo
            echo "Generated manifest artifact: \`desktop-download-bundle\`"
            echo
            echo "Files:"
            find dist -maxdepth 2 -type f | sort | sed 's|^|- `|' | sed 's|$|`|'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-downloads:
    name: Deploy Downloads Bundle
    needs: generate-manifest
    if: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_portal_downloads)) && vars.CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR != '' }}
    runs-on: ubuntu-latest
    env:
      CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR: ${{ vars.CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR }}

    steps:
      - name: Validate deployment directory variable
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR}" ]]; then
            echo "Set repository variable CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR before enabling deploy_portal_downloads." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download manifest bundle
        uses: actions/download-artifact@v4
        with:
          name: desktop-download-bundle
          path: dist

      - name: Publish bundle to portal downloads directory
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/publish-download-bundle.sh dist "$CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR"
