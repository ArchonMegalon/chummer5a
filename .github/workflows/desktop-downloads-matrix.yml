name: Desktop Downloads Matrix

on:
  workflow_dispatch:
  push:
    branches:
      - Docker
    paths:
      - '.github/workflows/desktop-downloads-matrix.yml'
      - 'Chummer.Avalonia/**'
      - 'Chummer.Contracts/**'
      - 'Chummer.Presentation/**'
      - 'global.json'

permissions:
  contents: read

jobs:
  build-avalonia:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive_ext: zip
          - os: windows-latest
            rid: win-arm64
            archive_ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive_ext: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            archive_ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Chummer.Avalonia/Chummer.Avalonia.csproj

      - name: Publish Avalonia desktop
        shell: bash
        run: |
          set -euo pipefail
          out_dir="out/${{ matrix.rid }}"
          dotnet publish Chummer.Avalonia/Chummer.Avalonia.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o "$out_dir"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $archive = "dist/chummer-avalonia-${{ matrix.rid }}.zip"
          if (Test-Path $archive) { Remove-Item $archive -Force }
          Compress-Archive -Path "out/${{ matrix.rid }}/*" -DestinationPath $archive -Force

      - name: Package archive (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -C "out/${{ matrix.rid }}" -czf "dist/chummer-avalonia-${{ matrix.rid }}.tar.gz" .

      - name: Upload RID artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.rid }}
          path: dist/chummer-avalonia-${{ matrix.rid }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 14

  generate-manifest:
    name: Generate Downloads Manifest
    needs: build-avalonia
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: dist

      - name: Generate releases.json
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          dist = Path('dist')
          dist.mkdir(parents=True, exist_ok=True)

          platform_names = {
              'win-x64': 'Windows x64',
              'win-arm64': 'Windows ARM64',
              'linux-x64': 'Linux x64',
              'linux-arm64': 'Linux ARM64',
              'osx-arm64': 'macOS ARM64',
          }

          downloads = []
          pattern = re.compile(r'^chummer-avalonia-(?P<rid>[^.]+)\.(?P<ext>zip|tar\.gz)$')
          for artifact in sorted(dist.iterdir()):
              if not artifact.is_file():
                  continue
              match = pattern.match(artifact.name)
              if not match:
                  continue

              rid = match.group('rid')
              sha256 = hashlib.sha256(artifact.read_bytes()).hexdigest()
              downloads.append(
                  {
                      'id': f'avalonia-{rid}',
                      'platform': platform_names.get(rid, rid),
                      'url': f'/downloads/{artifact.name}',
                      'sha256': sha256,
                  }
              )

          if not downloads:
              raise SystemExit('No desktop artifacts were found for manifest generation')

          manifest = {
              'version': f"run-{os.environ.get('GITHUB_RUN_NUMBER', 'local')}",
              'channel': 'docker',
              'publishedAt': datetime.datetime.now(datetime.timezone.utc).isoformat().replace('+00:00', 'Z'),
              'downloads': downloads,
          }

          manifest_path = dist / 'releases.json'
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          print(f'Wrote {manifest_path}')
          PY

      - name: Upload manifest bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-download-bundle
          path: dist
          if-no-files-found: error
          retention-days: 14

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## Desktop Download Bundle"
            echo
            echo "Generated manifest artifact: \`desktop-download-bundle\`"
            echo
            echo "Files:"
            ls -1 dist | sed 's/^/- `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"
