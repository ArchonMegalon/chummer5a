services:
  # Primary migration runtime: API + Blazor head. Legacy Chummer.Web is intentionally excluded.
  chummer-api:
    image: chummer-api:local
    build:
      context: .
      dockerfile: Chummer.Api/Dockerfile
    environment:
      CHUMMER_STATE_PATH: "/app/state"
      CHUMMER_API_KEY: "${CHUMMER_API_KEY:-}"
      CHUMMER_PROTECT_API_DOCS: "${CHUMMER_PROTECT_API_DOCS:-}"
      CHUMMER_AMENDS_PATH: "/app/amends"
    ports:
      - "${CHUMMER_API_PORT:-${CHUMMER_WEB_PORT:-8088}}:8080"
    volumes:
      - chummer-state:/app/state
      - ./Docker/Amends:/app/amends:ro
  chummer-blazor:
    image: chummer-blazor:local
    build:
      context: .
      dockerfile: Chummer.Blazor/Dockerfile
    depends_on:
      - chummer-api
    environment:
      CHUMMER_API_BASE_URL: "http://chummer-api:8080"
      CHUMMER_API_KEY: "${CHUMMER_API_KEY:-}"
      CHUMMER_BLAZOR_PATH_BASE: "${CHUMMER_BLAZOR_PATH_BASE:-}"
    ports:
      - "${CHUMMER_BLAZOR_PORT:-8089}:8080"
  chummer-blazor-portal:
    image: chummer-blazor:local
    build:
      context: .
      dockerfile: Chummer.Blazor/Dockerfile
    depends_on:
      - chummer-api
    profiles: ["portal"]
    environment:
      CHUMMER_API_BASE_URL: "http://chummer-api:8080"
      CHUMMER_API_KEY: "${CHUMMER_API_KEY:-}"
      CHUMMER_BLAZOR_PATH_BASE: "/blazor"
  chummer-avalonia-browser:
    image: chummer-avalonia-browser:local
    build:
      context: .
      dockerfile: Chummer.Avalonia.Browser/Dockerfile
    profiles: ["portal"]
    environment:
      CHUMMER_AVALONIA_BROWSER_PATH_BASE: "/avalonia"
  chummer-portal:
    image: chummer-portal:local
    build:
      context: .
      dockerfile: Chummer.Portal/Dockerfile
    depends_on:
      - chummer-api
      - chummer-blazor-portal
      - chummer-avalonia-browser
    profiles: ["portal"]
    environment:
      CHUMMER_PORTAL_BLAZOR_URL: "${CHUMMER_PORTAL_BLAZOR_URL:-/blazor/}"
      CHUMMER_PORTAL_BLAZOR_PROXY_URL: "${CHUMMER_PORTAL_BLAZOR_PROXY_URL:-http://chummer-blazor-portal:8080/}"
      CHUMMER_PORTAL_AVALONIA_URL: "${CHUMMER_PORTAL_AVALONIA_URL:-/avalonia/}"
      CHUMMER_PORTAL_AVALONIA_PROXY_URL: "${CHUMMER_PORTAL_AVALONIA_PROXY_URL:-http://chummer-avalonia-browser:8080/}"
      CHUMMER_PORTAL_API_URL: "${CHUMMER_PORTAL_API_URL:-http://chummer-api:8080/}"
      CHUMMER_API_KEY: "${CHUMMER_API_KEY:-}"
      CHUMMER_PORTAL_API_KEY: "${CHUMMER_PORTAL_API_KEY:-}"
      CHUMMER_PORTAL_DOWNLOADS_URL: "${CHUMMER_PORTAL_DOWNLOADS_URL:-/downloads/}"
      CHUMMER_PORTAL_DOWNLOADS_PROXY_URL: "${CHUMMER_PORTAL_DOWNLOADS_PROXY_URL:-}"
      CHUMMER_PORTAL_RELEASES_FILE: "${CHUMMER_PORTAL_RELEASES_FILE:-/app/downloads/releases.json}"
      CHUMMER_PORTAL_RELEASES_DIR: "${CHUMMER_PORTAL_RELEASES_DIR:-/app/downloads}"
    volumes:
      - ./Docker/Downloads:/app/downloads:ro
    ports:
      - "${CHUMMER_PORTAL_PORT:-8091}:8080"
  chummer-tests:
    image: chummer-tests:local
    build:
      context: .
      dockerfile: Docker/Dockerfile.tests
    depends_on:
      - chummer-api
    profiles: ["test"]
    environment:
      CHUMMER_API_BASE_URL: "http://chummer-api:8080"
      CHUMMER_WEB_BASE_URL: "http://chummer-api:8080"
      CHUMMER_API_KEY: "${CHUMMER_API_KEY:-}"
      CHUMMER_AMENDS_EXPECTED_ID: "${CHUMMER_AMENDS_EXPECTED_ID:-local-test-amend}"
    command: >
      dotnet test Chummer.Tests/Chummer.Tests.csproj
      -c Release
      -f net10.0
      -p:TargetFramework=net10.0
      --no-build
      --no-restore
      --tl:off
      --logger "trx;LogFileName=test-results-linux.trx"
      --logger "console;verbosity=normal"
  chummer-playwright:
    image: chummer-playwright:local
    build:
      context: .
      dockerfile: Docker/Dockerfile.playwright
    depends_on:
      - chummer-api
      - chummer-blazor
    profiles: ["test"]
    environment:
      CHUMMER_BLAZOR_BASE_URL: "http://chummer-blazor:8080"
      CHUMMER_API_BASE_URL: "http://chummer-api:8080"
      CHUMMER_API_KEY: "${CHUMMER_API_KEY:-}"
    command: >
      node /work/scripts/e2e-ui-playwright.cjs
  chummer-playwright-portal:
    image: chummer-playwright:local
    build:
      context: .
      dockerfile: Docker/Dockerfile.playwright
    depends_on:
      - chummer-portal
    profiles: ["portal"]
    command: >
      node /work/scripts/e2e-portal.cjs

volumes:
  chummer-state:
